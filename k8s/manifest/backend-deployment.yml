apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend-deployment
  labels:
    app: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
      - name: todo-backend
        image: shanmukha8197/todo-backend:v2
        env:
        - name: DB_URL
          value: jdbc:mysql://todo-db-service:3306/todo_db
        - name: DB_USERNAME
          value: username
        - name: DB_PASSWORD
          value: password
        ports:
        - containerPort: 8080