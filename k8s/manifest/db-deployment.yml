apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-db-deployment
  labels:
    app: todo-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-db
  template:
    metadata:
      labels:
        app: todo-db
    spec:
      containers:
      - name: todo-db
        image: mysql:latest
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: password
        - name: MYSQL_USERNAME
          value: username
        - name: MYSQL-DATABASE
          value: todo_db
        ports:
        - containerPort: 3306